<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba de Logo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .test {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Prueba de Carga de Logo</h1>
    
    <div class="test">
        <h2>Logo Original (320px)</h2>
        <img src="2.png" alt="Logo prueba">
        <p>Ruta: 2.png</p>
    </div>
    
    <div class="test">
        <h2>Logo Redimensionado (160px)</h2>
        <img src="2.png" alt="Logo prueba" style="width: 160px;">
    </div>
    
    <div class="test">
        <h2>Volver a la página principal</h2>
        <a href="index.html">Localizave - Página Principal</a>
    </div>
</body>
</html>
