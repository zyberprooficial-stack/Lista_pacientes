# Render Blueprint para Sistema de Pacientes
# Este archivo automatiza el deploy en Render

services:
  # Base de datos PostgreSQL
  - type: pserv
    name: pacientes-db
    plan: free
    databaseName: pacientes_db
    databaseUser: pacientes_user

  # Backend en Go
  - type: web
    name: pacientes-backend
    env: go
    plan: free
    buildCommand: cd backend && go build -o pacientes-server
    startCommand: cd backend && ./pacientes-server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pacientes-db
          property: connectionString
      - key: PORT
        value: 8080
      - key: MAX_DB_CONNECTIONS
        value: 10
      - key: MAX_IDLE_CONNECTIONS
        value: 3
      - key: RATE_LIMIT_PER_MINUTE
        value: 100
      - key: GOOGLE_MAPS_API_KEY
        sync: false
    healthCheckPath: /health
